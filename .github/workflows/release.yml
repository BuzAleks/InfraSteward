name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-info:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
      body: ${{ steps.meta.outputs.body }}
    steps:
      - name: Generate release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            BRANCH="${GITHUB_REF_NAME#release/}"
            SLUG="$(echo "${BRANCH}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
            if [[ -z "${SLUG}" ]]; then
              SLUG="branch"
            fi
            SHORT_SHA="${GITHUB_SHA::7}"
            TAG="release-${SLUG}-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          fi

          {
            echo "tag=${TAG}"
            echo "name=InfraSteward ${TAG}"
            echo "body<<EOF"
            echo "Automated InfraSteward release for \`${GITHUB_REF_NAME}\`."
            echo ""
            echo "Commit: \`${GITHUB_SHA}\`"
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: release-info
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            args: "--target x86_64-apple-darwin --bundles app,dmg"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-24.04
            args: "--bundles appimage,deb"
            rust-target: ""
          - platform: windows-2022
            args: "--bundles msi"
            rust-target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}
      - name: Install Linux Tauri dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ needs.release-info.outputs.tag }}
          releaseName: ${{ needs.release-info.outputs.name }}
          releaseBody: ${{ needs.release-info.outputs.body }}
          releaseDraft: false
          prerelease: false
          uploadPlainBinary: true
